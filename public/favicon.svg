<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- White rounded square background -->
  <rect width="64" height="64" rx="12" fill="#FFFFFF"/>

  <!-- Tram body — Bernmobil-red side-view silhouette with streamlined nose -->
  <path d="M8 28 C 8 22 11 18 17 18 L 51 18 Q 56 18 56 23 L 56 44 Q 56 48 51 48 L 13 48 Q 8 48 8 44 Z"
        fill="#E2001A"/>

  <!-- Continuous window strip -->
  <rect x="12" y="22" width="40" height="11" rx="1.5" fill="#0E1116"/>

  <!-- Window mullions in tram-body red -->
  <g fill="#E2001A">
    <rect x="22" y="22" width="1.2" height="11"/>
    <rect x="32" y="22" width="1.2" height="11"/>
    <rect x="42" y="22" width="1.2" height="11"/>
  </g>

  <!-- LED line indicator: amber "9" in the cab-window area -->
  <text x="17" y="31" font-size="9" fill="#FFC400"
        font-weight="900" text-anchor="middle"
        font-family="ui-sans-serif, system-ui, sans-serif">9</text>

  <!-- Door seams -->
  <g stroke="#0E1116" stroke-width="0.6" opacity="0.55">
    <line x1="27" y1="33" x2="27" y2="48"/>
    <line x1="37" y1="33" x2="37" y2="48"/>
  </g>

  <!-- Headlight -->
  <circle cx="10" cy="42" r="1.5" fill="#FFC400"/>

  <!-- Three bogies -->
  <circle cx="16" cy="49" r="2.5" fill="#0E1116"/>
  <circle cx="32" cy="49" r="2.5" fill="#0E1116"/>
  <circle cx="48" cy="49" r="2.5" fill="#0E1116"/>
</svg>
